services:
  ved-singh-portfolio:
    container_name: ved-singh-portfolio
    build: .
    image: ved-singh-portfolio:latest
    restart: unless-stopped
    ports:
      - "3011:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3011}
    volumes:
      - ved-portfolio-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ved-network

volumes:
  ved-portfolio-logs:
    name: ved-portfolio-logs

networks:
  ved-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.99.0/24
