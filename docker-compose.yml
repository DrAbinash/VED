name: ved

services:
  ved-singh-portfolio:
    container_name: ved-singh-portfolio
    build: .
    image: ved-singh-portfolio:latest
    restart: unless-stopped
    ports:
      - "3011:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3011}
      # Change this! It protects the /admin photo-upload panel.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ved2026}
      - DATABASE_URL=file:/app/data/ved.db
      - UPLOADS_DIR=/app/data/uploads
    volumes:
      # Uploaded photos + the settings database live here, so they
      # survive container rebuilds and image updates.
      - ved-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ved-network

volumes:
  ved-data:
    name: ved-portfolio-data

networks:
  ved-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.20.0/24
